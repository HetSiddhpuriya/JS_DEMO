<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Random Quotes</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-100 flex items-center justify-center h-screen">

<div class="bg-white shadow-xl rounded-xl p-8 max-w-xl w-full text-center">

<h1 class="text-3xl font-bold text-purple-600 mb-6">
🧘 Random Quotes Generator
</h1>

<p id="quoteText" class="text-lg text-gray-700 italic mb-4">
Loading quote...
</p>

<p id="quoteAuthor" class="text-sm text-gray-500 mb-6"></p>

<button onclick="GetQuote()" 
class="bg-purple-600 text-white px-6 py-2 rounded-lg hover:bg-purple-700 transition">

New Quote

</button>

</div>

<script src="script.js"></script>

</body>
</html>
